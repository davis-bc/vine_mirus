# ── Pipeline Parameters ──────────────────────────────────────────────────────

# Minimum contig length passed to viral detection tools
min_contig_length: 1000

# Minimum combined viral probability score to retain a contig
viral_score_threshold: 0.5

# Per-tool weights for evidence scoring (must sum to 1.0)
tool_weights:
  genomad: 0.34
  virsorter2: 0.33
  pprmeta: 0.33

# CoverM abundance metric
coverm_metric: rpkm

# Test mode: when true, viral prediction tools produce mock outputs instead of
# running the real tools. Used for end-to-end pipeline logic testing without databases.
test_mode: true

# ── Database Paths ────────────────────────────────────────────────────────────
# Paths to reference databases. These are downloaded automatically on first run
# by the database setup rules in workflow/rules/databases.smk.

# geNomad database (genomad download-database databases/genomad_db)
genomad_db: databases/genomad_db

# VirSorter2 database (virsorter setup --db-dir databases/virsorter2_db)
virsorter2_db: databases/virsorter2_db

# CheckV database (checkv download_database databases/checkv_db)
checkv_db: databases/checkv_db

# NCBI taxdump directory (contains nodes.dmp and names.dmp)
taxdump_dir: databases/taxdump

# DIAMOND viral RefSeq database (built from NCBI viral RefSeq proteins)
diamond_db: databases/diamond/nr_viral.dmnd

# ── fastp ─────────────────────────────────────────────────────────────────────
fastp_min_length: 50
fastp_qualified_quality: 15

# ── MEGAHIT ───────────────────────────────────────────────────────────────────
megahit_min_contig_len: 500   # pre-filter; viral tools re-filter at min_contig_length

# ── VirSorter2 ────────────────────────────────────────────────────────────────
virsorter2_groups:
  - dsDNAphage
  - ssDNA
  - NCLDV
  - RNA
  - lavidaviridae
virsorter2_min_score: 0.5

# ── DIAMOND ───────────────────────────────────────────────────────────────────
diamond_evalue: 1e-5
diamond_max_target_seqs: 5
diamond_outfmt: "6 qseqid sseqid pident length evalue bitscore staxids sscinames"
